<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank You</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:

        radial-gradient(circle at 80% 0%, rgba(109, 63, 214, 0.16) 0%, rgba(109, 63, 214, 0) 38%),

      color: #23193a;
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
      padding: 16px;
      text-align: center;
      line-height: 1.5;
    }

    .card {
      max-width: 620px;
      background: #ffffff;
      border: 1px solid #d5c8ef;
      border-radius: 12px;
      padding: 22px;
      box-shadow: 0 10px 26px rgba(61, 30, 120, 0.1);

    .logo {
      width: 84px;
      height: auto;
      margin-bottom: 8px;
      filter: drop-shadow(0 4px 8px rgba(70, 34, 134, 0.2));
    }

    a {
      color: #6d3fd6;
    }

<body>
  <main class="card">
    <img class="logo" src="RA_logo.svg" alt="Relationship Anarchy logo">
    <p>Your response has been submitted. Thank you for taking part.</p>
    <p><a href="index.html">Back to survey page</a></p>

</html>
